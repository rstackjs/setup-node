sources:
  npm: true

allowed:
  - apache-2.0
  - 0bsd
  - bsd-2-clause
  - bsd-3-clause
  - isc
  - mit
  - cc0-1.0
  - unlicense

reviewed:
  npm:
     - "@actions/http-client"

# Platform-specific optional binaries cannot be reliably cached across environments
ignored:
  npm:
    - "@esbuild/aix-ppc64"
    - "@esbuild/android-arm"
    - "@esbuild/android-arm64"
    - "@esbuild/android-x64"
    - "@esbuild/darwin-arm64"
    - "@esbuild/darwin-x64"
    - "@esbuild/freebsd-arm64"
    - "@esbuild/freebsd-x64"
    - "@esbuild/linux-arm"
    - "@esbuild/linux-arm64"
    - "@esbuild/linux-ia32"
    - "@esbuild/linux-loong64"
    - "@esbuild/linux-mips64el"
    - "@esbuild/linux-ppc64"
    - "@esbuild/linux-riscv64"
    - "@esbuild/linux-s390x"
    - "@esbuild/linux-x64"
    - "@esbuild/netbsd-arm64"
    - "@esbuild/netbsd-x64"
    - "@esbuild/openbsd-arm64"
    - "@esbuild/openbsd-x64"
    - "@esbuild/openharmony-arm64"
    - "@esbuild/sunos-x64"
    - "@esbuild/win32-arm64"
    - "@esbuild/win32-ia32"
    - "@esbuild/win32-x64"
    - fsevents